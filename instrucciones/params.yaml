# params.yaml — Parámetros operativos del workflow (v0.2)
#
# Reorganización v0.2: la información se reparte entre 3 archivos:
#   - params.yaml (este): timeouts, batches, handoff budgets, política de derivados.
#   - model_routing.yaml: selección de modelo por paso/función, basada en evidencia.
#   - catalog_tools.md: stack de tools con primary+fallback.
#
# Lo que SOLÍA estar acá y migró a model_routing.yaml:
#   - step6_combos (combos modelo+tool por intento) → ahora viven en model_routing.yaml.
#   - model_pools (pools por función) → ahora en model_routing.yaml.
#   - tool_pools (pools de tools) → ahora en catalog_tools.md como capas con primary+fallback.

version: 0.2

# ---------------------------------------------------------------
# BATCHING Y LIMITES
# ---------------------------------------------------------------

batching:
  # Paso 1.0.b XLSX: umbrales para la decisión de representación por hoja.
  # Usados por scripts/extractors/xlsx_sheet_analyze.py.
  xlsx_text_cell_threshold_chars: 200       # longitud mínima para considerar "texto largo"
  xlsx_text_cell_ratio_for_md_text: 0.40    # ratio de celdas con texto largo para clasificar como markdown_text
  xlsx_text_max_cols_for_md_text: 3         # max columnas para considerar hoja como narrativa
  xlsx_header_merged_triggers_html: true    # merged cells en filas 1-3 → html_table
  xlsx_data_merged_triggers_html: true      # merged cells en filas de datos → html_table
  # Paso 1.2b Planos/diagramas: detección geométrica y rasterización.
  plan_pages_area_ratio_threshold: 1.4
  plan_pages_min_width_pt: 700
  plan_pages_min_height_pt: 1000
  plan_pages_render_dpi: 150
  # 1.2b image_heavy detection thresholds
  plan_pages_image_area_ratio_threshold: 0.4
  plan_pages_image_min_width_pct: 0.15
  plan_pages_max_images_per_candidate_page: 4
  plan_pages_max_consecutive_image_heavy: 5
  plan_pages_image_heavy_doc_pct_disable: 0.7
  # Paso 1.5 Índice estructural: lectura secuencial con overlap fijo.
  document_index_chunk_lines: 200
  document_index_overlap_lines: 50
  # Paso 2.3 BOM Exploded: si HL tiene >20 items, productor procesa por grupo.
  bom_exploded_partial_threshold_items: 20
  # Paso 3.1 Specs: procesar en batches de 5 items con context selectivo.
  batch_size_specs: 5
  # Paso 3.2 Revisor: chunks de 15 items para evitar context overload.
  batch_size_review: 15
  # Paso 6 Búsqueda: items simultáneos.
  batch_size_items_step6: 3
  # Workers paralelos por item en paso 6 (no cambiar — el diseño asume 2).
  search_workers_per_item: 2

limits:
  # Paso 6: relanzamientos del subagente-item (iteración inicial + N relanzamientos).
  max_relanzamientos_item: 2
  min_candidatos_validos_por_item: 1
  objetivo_candidatos_por_item: 3

# ---------------------------------------------------------------
# TIMEOUTS (segundos)
# ---------------------------------------------------------------

timeouts:
  default: 300                 # 5 min — pasos estándar (OCR, merge, BOM, specs, QA).
  xlsx_pipeline: 300           # 5 min — Paso 1.0.b (split + analyze + convert) por archivo XLSX.
  plan_pages_vision: 900       # 15 min — Paso 1.2b análisis visual de páginas candidatas.
  document_indexer: 1800       # 30 min — Paso 1.5 lectura completa por documento con overlap.
  bom_productor: 600           # 10 min — paso 2.1 y 2.3 (BOM HL y Exploded).
  bom_auditor: 300             # 5 min — paso 2.2 y 2.4.
  specs_batch: 300             # 5 min por batch de 5 items (paso 3.1).
  specs_revisor_chunk: 300     # 5 min por chunk de 15 items (paso 3.2).
  search_worker: 600           # 10 min por worker (paso 6).
  item_manager: 1500           # 25 min — ciclo completo del subagente-item con reintentos.
  matriz_cumplimiento: 300     # 5 min por matriz por candidato.

# ---------------------------------------------------------------
# HANDOFF BUDGETS
# ---------------------------------------------------------------
# Cuántas veces puede un handoff (productor → auditor → ?) iterar antes de fail loud.
# 1 = revisor revisa una vez, sin reverse edge. 0 = critic terminal sin reverse.

handoff_budgets:
  paso_1_4_merge_aclaraciones: 1
  paso_2_1_bom_hl: 1
  paso_2_3_bom_exploded: 1
  paso_3_2_specs_revisor: 1
  paso_6_matriz: 1
  paso_7_2_qa: 0

# ---------------------------------------------------------------
# REINTENTOS POR TOOL
# ---------------------------------------------------------------

retries:
  tool_call_default: 2
  per_tool:
    brave: 1
    exa: 1
    tavily: 1
    perplexity: 1
    tinyfish: 1
    jina_reader: 2
    firecrawl: 2              # parsing puede fallar por timeout del sitio destino.
    browserbase: 2
    docling: 2
    llamaparse: 1

# ---------------------------------------------------------------
# POLITICA DE DIVERSIDAD (refuerza model_routing.yaml)
# ---------------------------------------------------------------

diversity:
  no_repetir_modelo_en_subagentes_paralelos: true
  no_repetir_tool_en_subagentes_paralelos: true
  rotar_modelo_y_tool_en_relanzamientos: true
  revisor_debe_usar_modelo_distinto_al_productor: true

# ---------------------------------------------------------------
# POLITICA DE DERIVADOS AUTOMATICOS
# ---------------------------------------------------------------
# Cuando un subagente entrega JSON canónico, el orquestador genera estos derivados
# determinísticamente (sin LLM call).

auto_derivatives:
  bom_envelope_json_to: ["tsv", "md"]              # paso 2.1, 2.3
  item_pack_json_to: ["md"]                        # paso 2.5
  item_specs_json_to: ["md"]                       # paso 3.1
  item_resultado_json_to: ["md"]                   # paso 6 resultado
  matriz_json_to: ["md"]                           # paso 6 matriz
  bom_busqueda_json_to: ["tsv"]                    # paso 4
  consolidado_json_to: ["tsv", "md", "xlsx"]       # paso 7.1

# ---------------------------------------------------------------
# MONITOREO DE CREDITOS (nuevo en v0.2)
# ---------------------------------------------------------------
# Antes de lanzar paso 6, verificar saldo de cada vendor y abortar si está bajo.
# Si un vendor llega a 10% del budget durante paso 6, escalar a su fallback.

credit_monitoring:
  vendors_to_check: ["firecrawl", "exa", "tavily", "browserbase", "llamaparse"]
  abort_threshold_pct: 5        # abortar si vendor está al 5% del budget mensual
  fallback_threshold_pct: 10    # escalar a fallback si está al 10%

# ---------------------------------------------------------------
# COTAS DURAS POR ITEM (paso 6)
# ---------------------------------------------------------------
# Si un item alcanza estas cotas sin resolverse, el subagente-item devuelve
# SIN_CANDIDATO con diagnóstico — NO sigue gastando budget.

per_item_caps_step6:
  max_fetches_html: 8
  max_pdf_downloads: 3
  max_pdf_parses: 3
  max_search_calls: 12          # 6 por worker × 2 workers
