# Ejecutar desde la raíz del repo:
#   cp config.example.yaml config.yaml
#   cp deploy/.env.example deploy/.env
#   docker compose -f deploy/docker-compose.yml up -d --build

x-app-environment: &app-environment
  TENDER_REPO_ROOT: ${TENDER_REPO_ROOT:-/app}
  CONFIG_PATH: ${CONFIG_PATH:-/app/config.yaml}
  DATABASE_URL: ${DATABASE_URL:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  SEACE_HTTP_PROXY: ${SEACE_HTTP_PROXY:-}
  HTTP_PROXY: ${HTTP_PROXY:-${SEACE_HTTP_PROXY:-}}
  HTTPS_PROXY: ${HTTPS_PROXY:-${HTTP_PROXY:-${SEACE_HTTP_PROXY:-}}}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seace}
      POSTGRES_DB: ${POSTGRES_DB:-seace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seace}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../data:/app/data
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
    command: >
      python -m seace_monitor web -c /app/config.yaml --host 0.0.0.0 --port 8080

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../data:/app/data
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
    command: >
      python -m seace_monitor scan -c /app/config.yaml

volumes:
  pgdata:
