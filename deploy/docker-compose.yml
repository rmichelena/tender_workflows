# SQLite por defecto (desde la raíz del repo):
#   cp config.example.yaml config.yaml
#   cp deploy/.env.example deploy/.env
#   docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d --build
#
# Postgres opt-in:
#   docker compose --env-file deploy/.env \
#     -f deploy/docker-compose.yml -f deploy/docker-compose.postgres.yaml up -d --build

name: ${COMPOSE_PROJECT_NAME:-tender-workflows}

x-app-environment: &app-environment
  TENDER_REPO_ROOT: ${TENDER_REPO_ROOT:-/app}
  CONFIG_PATH: ${CONFIG_PATH:-/app/config.yaml}
  DATABASE_URL: ${DATABASE_URL:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  SEACE_HTTP_PROXY: ${SEACE_HTTP_PROXY:-}
  HTTP_PROXY: ${HTTP_PROXY:-${SEACE_HTTP_PROXY:-}}
  HTTPS_PROXY: ${HTTPS_PROXY:-${HTTP_PROXY:-${SEACE_HTTP_PROXY:-}}}
  TENANT_ID: ${TENANT_ID:-default}

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../data:/app/data
    environment: *app-environment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      python -m seace_monitor web -c /app/config.yaml --host 0.0.0.0 --port 8080

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../data:/app/data
    environment: *app-environment
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "seace_monitor", "worker-healthcheck", "-c", "/app/config.yaml"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >
      python -m seace_monitor scan -c /app/config.yaml
