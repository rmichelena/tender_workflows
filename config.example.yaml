# Copia a config.yaml en la raíz del repo

# Proxy HTTP para SEACE/Alfresco (requerido desde IPs de datacenter).
# Preferir deploy/.env: SEACE_HTTP_PROXY o HTTP_PROXY.
# http_proxy: http://server.maczona.com:18081

poll_interval: 6h
watchlist_refresh_interval: 3h
anio: 2026
database_url: sqlite:///./data/seace.db
max_pages: 1
rows_per_page: 15
data_dir: ./data
tenant_id: default

analysis:
  tender_procurement:
    # null = auto-detect raíz monorepo (instrucciones/ + scripts/)
    repo_path: null
    planos_mode: auto_leave
    run_axis0: true
    gemini_model: gemini-2.5-flash
    gemini_api_key_env: GEMINI_API_KEY
  stage2_script: ./scripts/portal/analyze_stage2.sh
  scripts_timeout_seconds: 3600
